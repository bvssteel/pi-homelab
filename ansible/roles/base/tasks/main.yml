---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ homelab_hostname }}"

- name: Read current timezone
  ansible.builtin.command:
    cmd: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false

- name: Set timezone
  ansible.builtin.command:
    cmd: "timedatectl set-timezone {{ homelab_timezone }}"
  when: current_timezone.stdout != homelab_timezone
  changed_when: true

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ homelab_base_packages }}"
    state: present

- name: Ensure core services are enabled
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - systemd-timesyncd
    - ssh
