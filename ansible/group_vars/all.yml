---
homelab_hostname: homeserver
homelab_timezone: Europe/Paris
homelab_locale: fr_FR.UTF-8
homelab_language: fr_FR:fr

homelab_admin_user: "{{ ansible_user_id }}"
homelab_admin_shell: /usr/bin/zsh

homelab_repo_url: https://github.com/bvssteel/pi-homelab.git
# Override at runtime with: -e homelab_repo_branch=<branch>
homelab_repo_branch: main
homelab_repo_dir: /opt/pi-homelab

homelab_root_dir: /srv/homelab
homelab_state_dir: /srv/homelab/state
homelab_backup_dir: /srv/homelab/backups
homelab_log_dir: /srv/homelab/logs

homelab_base_packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - htop
  - jq
  - locales
  - nano
  - restic
  - rclone
  - unattended-upgrades
  - zsh
  - zsh-autosuggestions
  - zsh-syntax-highlighting

homelab_enable_unattended_upgrades: true
homelab_deploy_stack: true
