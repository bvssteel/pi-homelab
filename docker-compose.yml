services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - /srv/homelab/state/home-assistant:/config

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      TZ: ${TZ:-Europe/Paris}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-homelab.local:3005,localhost:3005,127.0.0.1:3005}
    volumes:
      - ./config/homepage:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
